<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestGen - AI测试用例生成平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00ff;
            --neon-purple: #b829dd;
            --neon-green: #00ff88;
            --neon-yellow: #ffee00;
            --dark-bg: #0a0a0f;
            --dark-sidebar: #08080c;
            --dark-card: #12121a;
            --dark-border: #1e1e2e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 245, 255, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }
        
        .layout {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 260px;
            background: var(--dark-sidebar);
            border-right: 1px solid var(--dark-border);
            padding: 30px 0;
            position: relative;
        }
        
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.5;
        }
        
        .logo {
            padding: 0 30px 30px;
            font-size: 28px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
            letter-spacing: 4px;
            border-bottom: 1px solid var(--dark-border);
        }
        
        .nav-menu {
            list-style: none;
            padding: 20px 0;
        }
        
        .nav-item {
            padding: 16px 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            border-left: 3px solid transparent;
            position: relative;
        }
        
        .nav-item:hover {
            background: rgba(0, 245, 255, 0.05);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent);
            color: var(--neon-cyan);
            border-left-color: var(--neon-cyan);
        }
        
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .nav-icon {
            width: 24px;
            text-align: center;
            font-size: 18px;
        }
        
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            letter-spacing: 2px;
        }
        
        .header h1::before {
            content: '// ';
            color: var(--neon-pink);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .btn-primary {
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
        }
        
        .btn-primary:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--dark-border);
        }
        
        .btn-secondary:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        
        .btn-success {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }
        
        .btn-success:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        
        .card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            opacity: 0.5;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
        }
        
        .stat-card:nth-child(1)::before { background: var(--neon-cyan); }
        .stat-card:nth-child(2)::before { background: var(--neon-yellow); }
        .stat-card:nth-child(3)::before { background: var(--neon-green); }
        .stat-card:nth-child(4)::before { background: #ffa500; }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 8px;
            font-family: monospace;
        }
        
        .stat-card:nth-child(1) .stat-value { color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0, 245, 255, 0.5); }
        .stat-card:nth-child(2) .stat-value { color: var(--neon-yellow); text-shadow: 0 0 20px rgba(255, 238, 0, 0.5); }
        .stat-card:nth-child(3) .stat-value { color: var(--neon-green); text-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        .stat-card:nth-child(4) .stat-value { color: #ffa500; text-shadow: 0 0 20px rgba(255, 165, 0, 0.5); }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-item label {
            font-size: 12px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .filter-item select,
        .filter-item input {
            padding: 10px 14px;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .filter-item select:focus,
        .filter-item input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
        }
        
        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--neon-cyan);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--dark-border);
        }
        
        .data-table td {
            padding: 16px;
            border-bottom: 1px solid var(--dark-border);
            color: var(--text-secondary);
        }
        
        .data-table tr:hover td {
            color: var(--text-primary);
            background: rgba(0, 245, 255, 0.03);
        }
        
        .priority-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
        }
        
        .priority-P0 { background: rgba(255, 0, 85, 0.1); color: #ff0055; border-color: rgba(255, 0, 85, 0.3); }
        .priority-P1 { background: rgba(255, 136, 0, 0.1); color: #ff8800; border-color: rgba(255, 136, 0, 0.3); }
        .priority-P2 { background: rgba(0, 245, 255, 0.1); color: var(--neon-cyan); border-color: rgba(0, 245, 255, 0.3); }
        .priority-P3 { background: rgba(136, 136, 136, 0.1); color: #888; border-color: rgba(136, 136, 136, 0.3); }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
        }
        
        .status-pending_review { background: rgba(255, 238, 0, 0.1); color: var(--neon-yellow); border-color: rgba(255, 238, 0, 0.3); }
        .status-approved { background: rgba(0, 255, 136, 0.1); color: var(--neon-green); border-color: rgba(0, 255, 136, 0.3); }
        .status-rejected { background: rgba(255, 165, 0, 0.1); color: #ffa500; border-color: rgba(255, 165, 0, 0.3); }

        /* 置信度徽章 */
        .confidence-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid;
            display: inline-block;
        }
        .confidence-A { background: rgba(0, 255, 136, 0.15); color: #00ff88; border-color: rgba(0, 255, 136, 0.4); }
        .confidence-B { background: rgba(0, 200, 255, 0.15); color: #00c8ff; border-color: rgba(0, 200, 255, 0.4); }
        .confidence-C { background: rgba(255, 238, 0, 0.15); color: #ffee00; border-color: rgba(255, 238, 0, 0.4); }
        .confidence-D { background: rgba(255, 0, 85, 0.15); color: #ff4466; border-color: rgba(255, 0, 85, 0.4); }
        .confidence-none { background: rgba(136,136,136,0.1); color: #666; border-color: rgba(136,136,136,0.3); }

        /* RAG参考标签 */
        .rag-ref-badge { display: inline-block; }

        /* 低置信度行背景 */
        tr.row-confidence-C td { background: rgba(255, 238, 0, 0.04) !important; }
        tr.row-confidence-D td { background: rgba(255, 0, 85, 0.05) !important; }

        /* 置信度分项详情 */
        .confidence-breakdown { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .breakdown-item { flex: 1; min-width: 120px; background: rgba(255,255,255,0.04); border: 1px solid #1e1e2e; border-radius: 6px; padding: 8px 12px; }
        .breakdown-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .breakdown-value { font-size: 16px; font-weight: 700; }

        /* 引用来源面板 */
        .citation-list { list-style: none; padding: 0; margin: 0; }
        .citation-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border: 1px solid #1e1e2e; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.02); }
        .citation-item:hover { background: rgba(0,245,255,0.06); border-color: rgba(0,245,255,0.3); box-shadow: 0 0 12px rgba(0,245,255,0.15); }
        .citation-type-icon { font-size: 18px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(0,245,255,0.1); border-radius: 6px; }
        .citation-content { flex: 1; min-width: 0; }
        .citation-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .citation-source-id { font-size: 12px; color: var(--neon-cyan); font-family: monospace; font-weight: 600; }
        .citation-type-name { font-size: 11px; color: #888; padding: 2px 8px; background: rgba(136,136,136,0.1); border-radius: 4px; }
        .citation-count { font-size: 11px; color: #666; margin-left: auto; white-space: nowrap; }
        .citation-preview { font-size: 12px; color: #aaa; line-height: 1.5; margin-top: 6px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; border-left: 2px solid var(--neon-cyan); }
        .citation-preview-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .citation-actions { display: flex; gap: 8px; margin-top: 8px; }
        .citation-action-btn { padding: 4px 10px; font-size: 11px; border: 1px solid rgba(0,245,255,0.3); background: transparent; color: var(--neon-cyan); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .citation-action-btn:hover { background: var(--neon-cyan); color: var(--dark-bg); box-shadow: 0 0 8px rgba(0,245,255,0.3); }
        .citation-empty { color: #555; font-size: 13px; padding: 16px 0; text-align: center; }

        /* RAG详情模态框 */
        .rag-detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 3000; justify-content: center; align-items: center; }
        .rag-detail-modal.active { display: flex; }
        .rag-detail-content { background: var(--dark-card); border: 1px solid var(--dark-border); border-radius: 12px; width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; position: relative; }
        .rag-detail-content::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink)); }
        .rag-detail-header { padding: 24px 30px; border-bottom: 1px solid var(--dark-border); display: flex; justify-content: space-between; align-items: center; }
        .rag-detail-header h3 { color: var(--neon-cyan); font-size: 20px; letter-spacing: 2px; }
        .rag-detail-body { padding: 30px; }
        .rag-detail-section { margin-bottom: 24px; }
        .rag-detail-section-title { font-size: 14px; color: var(--neon-cyan); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--neon-cyan); padding-left: 12px; }
        .rag-detail-text { font-size: 13px; color: #ccc; line-height: 1.8; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
        .rag-detail-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .rag-meta-item { padding: 12px; background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.2); border-radius: 8px; }
        .rag-meta-label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .rag-meta-value { font-size: 14px; color: var(--text-primary); font-family: monospace; }

        /* 置信度排序箭头 */
        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { color: var(--neon-cyan); }
        .sort-arrow { margin-left: 4px; font-size: 10px; }
        
        .action-btns {
            display: flex;
            gap: 6px;
        }
        
        .action-btn {
            padding: 5px 10px;
            border: 1px solid var(--dark-border);
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
        }
        
        .action-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
        }
        
        .action-btn.approve:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        
        .action-btn.reject:hover {
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }
        
        /* 批量操作 */
        .batch-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 8px;
        }
        
        .batch-actions span {
            color: var(--neon-cyan);
            font-size: 13px;
        }
        
        /* 分页 */
        .pagination {
            margin-top: 30px;
        }
        
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-top: 1px solid var(--dark-border);
        }
        
        .pagination-left {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .page-size-select {
            padding: 8px 12px;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .page-size-select:hover {
            border-color: var(--neon-cyan);
        }
        
        .page-size-select:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
        }
        
        .pagination-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pagination-right {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .page-btn {
            padding: 8px 14px;
            border: 1px solid var(--dark-border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-family: monospace;
            font-size: 13px;
            min-width: 40px;
        }
        
        .page-btn:hover:not(.disabled) {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        
        .page-btn.active {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }
        
        .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .page-ellipsis {
            color: var(--text-secondary);
            padding: 0 4px;
        }
        
        .page-jump-input {
            width: 60px;
            padding: 8px 10px;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            text-align: center;
            transition: all 0.3s;
            font-family: monospace;
        }
        
        .page-jump-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
        }
        
        .pagination-info {
            text-align: center;
            padding: 16px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
        }
        
        .modal-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            color: var(--neon-cyan);
            font-size: 20px;
            letter-spacing: 2px;
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--dark-border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        
        .close-btn:hover {
            color: var(--neon-pink);
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--neon-cyan);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;

    <script>
        let currentPage = 1;
        let currentLimit = 10;
        let selectedCases = new Set();
        let currentCaseId = null;
        let confirmCallback = null;

        // 自定义确认弹窗
        function showConfirm(message, onConfirm) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('active');
            confirmCallback = onConfirm;
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        }

        function confirmOk() {
            document.getElementById('confirmModal').classList.remove('active');
            if (confirmCallback) {
                confirmCallback();
                confirmCallback = null;
            }
        }

        // 提示弹窗
        function showToast(message, type = 'info') {
            const toastModal = document.getElementById('toastModal');
            const toastBox = document.getElementById('toastBox');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toastBox.className = 'toast-box ' + type;
            toastIcon.textContent = type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ';
            toastMessage.textContent = message;

            toastModal.classList.add('active');
        }

        function closeToast() {
            document.getElementById('toastModal').classList.remove('active');
        }

        async function loadCases(page = 1, limit = null) {
            try {
                // 更新当前页码
                currentPage = page;
                if (limit) currentLimit = limit;

                const requirementId = document.getElementById('filterRequirement').value;
                const status = document.getElementById('filterStatus').value;
                const priority = document.getElementById('filterPriority').value;

                let url = `/api/cases?page=${page}&limit=${currentLimit}`;
                if (requirementId) url += `&requirement_id=${requirementId}`;
                if (status) url += `&status=${status}`;
                if (priority) url += `&priority=${priority}`;

                const response = await fetch(url);
                const data = await response.json();

                renderCaseList(data.items);
                renderPagination(data.total, data.page, data.limit);
            } catch (error) {
                console.error('加载用例失败:', error);
            }
        }

        async function loadCaseStats() {
            try {
                const response = await fetch('/api/cases/stats');
                const stats = await response.json();
                document.getElementById('totalCases').textContent = stats.total || 0;
                document.getElementById('pendingCases').textContent = stats.pending_review || 0;
                document.getElementById('approvedCases').textContent = stats.approved || 0;
                document.getElementById('rejectedCases').textContent = stats.rejected || 0;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        function renderCaseList(cases) {
            const tbody = document.getElementById('caseList');
            if (cases.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">

                    ? `<span style="font-size:10px;color:#ffee00;margin-left:4px;">待确认</span>`
                    : c.confidence_level === 'D'

                                <button class="action-btn reject" onclick="rejectCase(${c.id})" title="拒绝" aria-label="拒绝">✗</button>

                            ${(c.status === 3 || c.status === 4) ? `

        function renderConfidenceBadge(level, score) {
            if (!level) return '<span class="confidence-badge confidence-none">-</span>';
            const pct = score !== null && score !== undefined ? Math.round(score * 100) + '%' : '';
            return `<span class="confidence-badge confidence-${level}">${level}${pct ? ' ' + pct : ''}</span>`;
        }

        function getStatusText(status) {
            const map = {
                1: '草稿',
                2: '待评审',
                3: '已通过',
                4: '已拒绝'
            };
            return map[status] || status;
        }

        function renderPagination(total, page, limit) {
            const totalPages = Math.ceil(total / limit);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = `<div class="pagination-info">共 ${total} 条记录</div>`;
                return;
            }
            
            let html = '<div class="pagination-container">';
            
            // 左侧：每页条数选择 + 总记录数
            html += '<div class="pagination-left">';
            html += `<span>共 ${total} 条</span>`;
            html += '<select class="page-size-select" onchange="changePageSize(this.value)">';
            [10, 20, 50, 100, 200].forEach(size => {
                html += `<option value="${size}" ${size === limit ? 'selected' : ''}>${size}条/页</option>`;
            });
            html += '</select>';
            html += '</div>';
            
            // 中间：页码按钮
            html += '<div class="pagination-center">';
            
            // 上一页
            if (page > 1) {
                html += `<button class="page-btn" onclick="loadCases(${page - 1})">上一页</button>`;
            } else {
                html += `<button class="page-btn disabled" disabled>上一页</button>`;
            }
            
            // 页码逻辑（智能显示页码）
            const maxVisible = 7;
            let startPage = Math.max(1, page - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }
            
            // 第一页和省略号
            if (startPage > 1) {
                html += `<button class="page-btn" onclick="loadCases(1)">1</button>`;
                if (startPage > 2) {
                    html += '<span class="page-ellipsis">...</span>';
                }
            }
            
            // 页码按钮
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadCases(${i})">${i}</button>`;
            }
            
            // 最后一页和省略号
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += '<span class="page-ellipsis">...</span>';
                }
                html += `<button class="page-btn" onclick="loadCases(${totalPages})">${totalPages}</button>`;
            }
            
            // 下一页
            if (page < totalPages) {
                html += `<button class="page-btn" onclick="loadCases(${page + 1})">下一页</button>`;
            } else {
                html += `<button class="page-btn disabled" disabled>下一页</button>`;
            }
            
            html += '</div>';
            
            // 右侧：跳转到指定页
            html += '<div class="pagination-right">';
            html += `<span>跳至</span>`;
            html += `<input type="number" class="page-jump-input" min="1" max="${totalPages}" value="${page}" onkeypress="if(event.key==='Enter')jumpToPage(this)" />`;
            html += '</div>';
            
            html += '</div>';
            pagination.innerHTML = html;
        }
        
        function changePageSize(newLimit) {
            loadCases(1, parseInt(newLimit));
        }
        
        function jumpToPage(input) {
            const page = parseInt(input.value);
            const maxPage = parseInt(input.max);
            if (page >= 1 && page <= maxPage) {
                loadCases(page);
            } else {

        async function loadCaseDetail(id, editable) {
            try {
                const response = await fetch(`/api/cases/${id}`);
                const c = await response.json();
                if (!c || c.error) {
                    showToast('加载用例详情失败', 'error');
                    return;
                }

                currentCaseId = id;
                document.getElementById('caseId').value = c.case_id;
                document.getElementById('caseModule').value = c.module;
                document.getElementById('caseName').value = c.name;
                document.getElementById('casePriority').value = c.priority;
                // 将整数状态转换为字符串值以匹配select选项
                const statusMap = { 1: 'pending_review', 2: 'pending_review', 3: 'approved', 4: 'rejected' };
                document.getElementById('caseStatus').value = statusMap[c.status] || 'pending_review';
                document.getElementById('casePreconditions').value = c.preconditions || '';
                document.getElementById('caseSteps').value = (c.test_steps || []).join('\n');
                document.getElementById('caseExpected').value = (c.expected_results || []).join('\n');

                // 置信度信息
                const confPanel = document.getElementById('confidencePanel');
                if (c.confidence_level) {
                    confPanel.style.display = 'block';
                    document.getElementById('modalConfidenceBadge').innerHTML = renderConfidenceBadge(c.confidence_level, c.confidence_score);
                    const pct = c.confidence_score !== null && c.confidence_score !== undefined ? Math.round(c.confidence_score * 100) + '%' : '';
                    document.getElementById('modalConfidenceScore').textContent = pct ? `综合分数: ${pct}` : '';
                    // 分项详情（存储在 citations 第0项的 breakdown 字段中）
                    const breakdownEl = document.getElementById('modalConfidenceBreakdown');
                    const citations = c.citations || [];
                    const breakdown = (citations[0] && citations[0].breakdown) || {};
                    const breakdownLabels = {
                        semantic_similarity: '语义相似度',
                        keyword_coverage: '关键词覆盖',
                        rag_support: 'RAG支持度',
                        structure_completeness: '结构完整性',
                    };
                    if (Object.keys(breakdown).length > 0) {
                        breakdownEl.innerHTML = Object.entries(breakdownLabels).map(([k, label]) => {
                            const val = breakdown[k] !== undefined ? Math.round(breakdown[k] * 100) + '%' : '-';
                            return `<div class="breakdown-item"><div class="breakdown-label">${label}</div><div class="breakdown-value">${val}</div></div>`;
                        }).join('');
                    } else {
                        breakdownEl.innerHTML = '';
                    }
                } else {
                    confPanel.style.display = 'none';
                }

                // RAG参考标签
                const ragLabel = document.getElementById('ragReferenceLabel');
                if (ragLabel) {
                    ragLabel.textContent = c.rag_context && Object.keys(c.rag_context).length > 0 ? '已引用' : '未引用';
                    ragLabel.style.display = c.rag_context && Object.keys(c.rag_context).length > 0 ? 'inline-block' : 'none';
                }

                // 引用来源
                renderModalCitations(c.citations || []);

                document.getElementById('caseModal').classList.add('active');
            } catch (error) {
                console.error('加载用例详情失败:', error);
                showToast('加载用例详情失败', 'error');
            }
        }

        function renderModalCitations(citations) {
            const list = document.getElementById('modalCitationList');
            const countEl = document.getElementById('citationCount');
            
            if (!citations || citations.length === 0) {
                list.innerHTML = '<li class="citation-empty">暂无引用来源信息</li>';
                countEl.textContent = '';
                return;
            }
            
            const typeIcons = { historical_case: '📋', defect: '🐛', requirement: '📄', llm_generated: '🤖', unknown: '❓' };
            const typeNames = { historical_case: '历史用例', defect: '历史缺陷', requirement: '需求', llm_generated: 'AI生成', unknown: '未知' };
            
            // 更新引用数量
            countEl.textContent = `(${citations.length}个来源)`;
            
            list.innerHTML = citations.map((cit, index) => {
                const icon = typeIcons[cit.source_type] || '❓';
                const typeName = typeNames[cit.source_type] || cit.source_type;
                const sourceId = cit.source_id || '';
                const count = cit.count || 1;
                
                // 提取内容预览（从citations的第1项开始存储详情）
                const preview = cit.content_preview || cit.preview || cit.description || '';
                const similarity = cit.similarity_score || cit.similarity || null;
                
                return `<li class="citation-item" onclick="viewRagDetail(${index}, '${sourceId}', '${cit.source_type}')">
                    <div class="citation-type-icon">${icon}</div>
                    <div class="citation-content">
                        <div class="citation-header">
                            <span class="citation-source-id">${sourceId}</span>
                            <span class="citation-type-name">${typeName}</span>
                            ${similarity ? `<span style="font-size:11px;color:#00ff88;">相似度: ${Math.round(similarity * 100)}%</span>` : ''}
                            <span class="citation-count">×${count}</span>
                        </div>
                        ${preview ? `<div class="citation-preview"><div class="citation-preview-text">${preview}</div></div>` : ''}
                        <div class="citation-actions">
                            <button class="citation-action-btn" onclick="event.stopPropagation(); viewRagDetail(${index}, '${sourceId}', '${cit.source_type}')">🔍 查看详情</button>
                            ${cit.source_type !== 'llm_generated' && cit.source_type !== 'unknown' ? `<button class="citation-action-btn" onclick="event.stopPropagation(); searchRagData('${sourceId}', '${cit.source_type}')">🔎 RAG检索</button>` : ''}
                        </div>
                    </div>
                </li>`;
            }).join('');
        }

        function getCollectionName(sourceType) {
            const map = {
                'historical_case': 'historical_cases',
                'defect': 'defects',
                'requirement': 'requirements'
            };
            return map[sourceType] || 'historical_cases';
        }

        // 获取来源类型名称
        function getSourceTypeName(sourceType) {
            const map = {
                'historical_case': '历史用例',
                'defect': '历史缺陷',
                'requirement': '需求',
                'llm_generated': 'AI生成',
                'unknown': '未知'
            };
            return map[sourceType] || sourceType;
        }

        // HTML转义
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

            showToast('模板下载中...', 'info');
        }

        async function exportCases(format = 'excel', caseIds = null) {
            try {
                let body = { format };
                
                // 如果指定了用例ID列表
                if (caseIds && caseIds.length > 0) {
                    body.case_ids = caseIds;
                } else {
                    // 如果没有指定caseIds，使用当前筛选条件
                    const requirementId = document.getElementById('filterRequirement').value;
                    const status = document.getElementById('filterStatus').value;
                    const priority = document.getElementById('filterPriority').value;
                    
                    if (requirementId) body.requirement_id = parseInt(requirementId);
                    if (status) body.status = status;
                    if (priority) body.priority = priority;
                }
                
                const response = await fetch('/api/export/cases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = data.download_url;
                    showToast(`导出成功：${data.exported_count} 条用例`, 'success');
                } else {
                    showToast(`导出失败：${data.error}`, 'error');
                }
            } catch (error) {
                console.error('导出失败:', error);
                showToast('导出失败', 'error');
            }
        }

        async function loadRequirements() {
            try {
                const response = await fetch('/api/requirements?limit=100');
                const data = await response.json();
                const select = document.getElementById('filterRequirement');
                data.items.forEach(req => {
                    const option = document.createElement('option');
                    option.value = req.id;
                    option.textContent = req.title;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载需求列表失败:', error);
            }
        }

        // 导入按钮点击事件
        document.getElementById('importBtn').addEventListener('click', function() {
            document.getElementById('importFile').click();
        });

        // 导入文件选择事件
        document.getElementById('importFile').addEventListener('change', function() {
            importCases(this);
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadRequirements();
            
            // 检查URL参数，如果有requirement_id则自动筛选
            const urlParams = new URLSearchParams(window.location.search);
            const requirementId = urlParams.get('requirement_id');
            
            if (requirementId) {
                // 设置筛选器并加载对应的用例
                document.getElementById('filterRequirement').value = requirementId;
                loadCases(1);
                loadCaseStats();
                
                // 清除URL参数
                window.history.replaceState({}, document.title, 'cases.html');
                
                // 显示提示
                showToast(`已自动筛选需求ID: ${requirementId} 的用例`, 'info');
            } else {
                // 正常加载全部用例
                loadCases();
                loadCaseStats();
            }
        });
    </script>
</body>
</html>
