<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="20260419-v3-fix-llm-loading-enter-send">
    <title>TestGen - Chat 对话 v3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00ff;
            --neon-purple: #b829dd;
            --neon-green: #00ff88;
            --dark-bg: #0a0a0f;
            --dark-sidebar: #08080c;
            --dark-card: #12121a;
            --dark-border: #1e1e2e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 245, 255, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }
        
        .layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 260px;
            background: var(--dark-sidebar);
            border-right: 1px solid var(--dark-border);
            padding: 30px 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.5;
        }
        
        .logo {
            padding: 0 30px 30px;
            font-size: 28px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
            letter-spacing: 4px;
            border-bottom: 1px solid var(--dark-border);
        }
        
        .nav-menu {
            list-style: none;
            padding: 20px 0;
        }
        
        .nav-item {
            padding: 16px 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            border-left: 3px solid transparent;
            position: relative;
        }
        
        .nav-item:hover {
            background: rgba(0, 245, 255, 0.05);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent);
            color: var(--neon-cyan);
            border-left-color: var(--neon-cyan);
        }
        
        .nav-icon {
            width: 24px;
            text-align: center;
            font-size: 18px;
        }
        
        /* Chat Layout */
        .chat-layout {
            flex: 1;
            display: flex;
            min-width: 0;
            height: 100%;
            overflow: hidden;
        }
        
        /* Session Panel */
        .session-panel {
            width: 280px;
            background: var(--dark-sidebar);
            border-right: 1px solid var(--dark-border);
            display: flex;
            flex-direction: column;
        }
        
        .session-header {
            padding: 20px;
            border-bottom: 1px solid var(--dark-border);
        }
        
        .session-header h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--neon-cyan);
        }
        
        .new-session-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .new-session-btn:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
        }
        
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .session-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            position: relative;
        }
        
        .session-item:hover {
            background: rgba(0, 245, 255, 0.05);
        }
        
        .session-item.active {
            background: rgba(0, 245, 255, 0.1);
            border-left-color: var(--neon-cyan);
        }
        
        .session-title {
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .session-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .session-delete {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            font-size: 16px;
            padding: 4px 8px;
        }
        
        .session-item:hover .session-delete {
            opacity: 1;
        }
        
        .session-delete:hover {
            color: var(--neon-pink);
        }
        
        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .chat-header h1 {
            font-size: 24px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            letter-spacing: 2px;
        }
        
        .chat-header h1::before {
            content: '// ';
            color: var(--neon-pink);
        }
        
        .model-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }
        
        .model-selector label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .model-selector select {
            padding: 8px 12px;
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .model-selector select:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }
        
        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        
        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: var(--neon-cyan);
            color: var(--dark-bg);
        }
        
        .message.ai .message-avatar {
            background: var(--neon-purple);
            color: white;
        }
        
        .message-content {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.6;
        }
        
        .message.user .message-content {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid rgba(0, 245, 255, 0.3);
        }
        
        .message.ai .message-content {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
        }
        
        .message-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .message-text {
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-state p {
            font-size: 16px;
        }
        
        /* Loading Indicator */
        .loading-indicator {
            display: none;
            padding: 16px 20px;
            margin-bottom: 24px;
            color: var(--neon-cyan);
        }
        
        .loading-indicator.active {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-cyan);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Input Area */
        .input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--dark-border);
            display: flex;
            gap: 12px;
        }
        
        .input-area textarea {
            flex: 1;
            padding: 14px 18px;
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 150px;
            line-height: 1.5;
        }
        
        .input-area textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }
        
        .input-area textarea::placeholder {
            color: var(--text-secondary);
        }
        
        .send-btn {
            padding: 14px 28px;
            background: var(--neon-cyan);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .send-btn:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Error Message */
        .error-message {
            padding: 12px 16px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            margin-bottom: 16px;
        }
        
        /* Custom Confirm Dialog */
        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .confirm-overlay.active {
            display: flex;
        }
        
        .confirm-dialog {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.15);
        }
        
        .confirm-dialog::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
        }
        
        .confirm-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--neon-pink);
            margin-bottom: 12px;
        }
        
        .confirm-message {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .confirm-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .confirm-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .confirm-btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--dark-border);
        }
        
        .confirm-btn-cancel:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }
        
        .confirm-btn-ok {
            background: transparent;
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
        }
        
        .confirm-btn-ok:hover {
            background: var(--neon-pink);
            color: var(--dark-bg);
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">◈ TestGen</div>
            <ul class="nav-menu">
                <li class="nav-item active" onclick="location.href='chat.html'">
                    <span class="nav-icon">▣</span>
                    <span>Chat 对话</span>
                </li>
                <li class="nav-item" onclick="location.href='requirements.html'">
                    <span class="nav-icon">◉</span>
                    <span>需求管理</span>
                </li>
                <li class="nav-item" onclick="location.href='cases.html'">
                    <span class="nav-icon">◆</span>
                    <span>用例管理</span>
                </li>
                <li class="nav-item" onclick="location.href='rag.html'">
                    <span class="nav-icon">◈</span>
                    <span>RAG检索</span>
                </li>
                <li class="nav-item" onclick="location.href='prompts.html'">
                    <span class="nav-icon">▤</span>
                    <span>Prompt管理</span>
                </li>
                <li class="nav-item" onclick="location.href='config.html'">
                    <span class="nav-icon">▣</span>
                    <span>AI配置</span>
                </li>
            </ul>
        </aside>

        <div class="chat-layout">
            <!-- Session Panel -->
            <div class="session-panel">
                <div class="session-header">
                    <h3>会话列表</h3>
                    <button class="new-session-btn" onclick="createNewSession()">+ 新建会话</button>
                </div>
                <div class="session-list" id="sessionList">
                    <!-- Sessions will be rendered here -->
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="chat-main">
                <div class="chat-header">
                    <h1>Chat 对话 <span style="font-size:12px;color:var(--neon-green);opacity:0.6;">v3</span></h1>
                    <div class="model-selector">
                        <label for="modelSelect">LLM配置:</label>
                        <select id="modelSelect">
                            <option value="">加载中...</option>
                        </select>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-icon">◈</div>
                        <p>开始新的对话</p>
                    </div>
                </div>

                <div class="input-area">
                    <textarea id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== State Management ====================
        let sessions = [];
        let currentSessionId = null;
        let isLoading = false;
        let llmConfigs = [];

        // ==================== Initialization ====================
        async function init() {
            // Setup confirm dialog listeners (DOM must be ready)
            const confirmOkBtn = document.getElementById('confirmOk');
            const confirmCancelBtn = document.getElementById('confirmCancel');
            const confirmOverlay = document.getElementById('confirmOverlay');
            
            if (confirmOkBtn) {
                confirmOkBtn.addEventListener('click', function() {
                    confirmOverlay.classList.remove('active');
                    if (confirmCallback) { confirmCallback(); confirmCallback = null; }
                });
            }
            if (confirmCancelBtn) {
                confirmCancelBtn.addEventListener('click', function() {
                    confirmOverlay.classList.remove('active');
                    confirmCallback = null;
                });
            }
            if (confirmOverlay) {
                confirmOverlay.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                        confirmCallback = null;
                    }
                });
            }

            loadSessionsFromStorage();
            renderSessions();
            await loadLLMConfigs();
            
            if (sessions.length === 0) {
                createNewSession();
            } else if (!currentSessionId || !sessions.find(s => s.id === currentSessionId)) {
                switchSession(sessions[0].id);
            }
        }

        // ==================== Session Management ====================
        function loadSessionsFromStorage() {
            try {
                const stored = localStorage.getItem('chat_sessions');
                if (stored) {
                    sessions = JSON.parse(stored);
                }
                currentSessionId = localStorage.getItem('current_session_id');
            } catch (e) {
                console.error('加载会话失败:', e);
                sessions = [];
                currentSessionId = null;
            }
        }

        function saveSessionsToStorage() {
            try {
                localStorage.setItem('chat_sessions', JSON.stringify(sessions));
                localStorage.setItem('current_session_id', currentSessionId);
            } catch (e) {
                console.error('保存会话失败:', e);
                alert('存储空间不足，请清理部分会话后重试');
            }
        }

        function createNewSession() {
            const session = {
                id: Date.now().toString(),
                messages: [],
                createdAt: new Date().toISOString(),
                title: '新会话'
            };
            sessions.unshift(session);
            currentSessionId = session.id;
            saveSessionsToStorage();
            renderSessions();
            renderMessages();
        }

        function switchSession(sessionId) {
            currentSessionId = sessionId;
            saveSessionsToStorage();
            renderSessions();
            renderMessages();
        }

        function deleteSession(sessionId, event) {
            event.stopPropagation();
            showConfirm('删除会话', '确定要删除此会话吗？此操作不可恢复。', () => {
                sessions = sessions.filter(s => s.id !== sessionId);
                
                if (currentSessionId === sessionId) {
                    if (sessions.length > 0) {
                        currentSessionId = sessions[0].id;
                    } else {
                        createNewSession();
                        return;
                    }
                }
                
                saveSessionsToStorage();
                renderSessions();
                renderMessages();
            });
        }

        function renderSessions() {
            const container = document.getElementById('sessionList');
            if (sessions.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary)">暂无会话</div>';
                return;
            }
            
            container.innerHTML = sessions.map(session => {
                const isActive = session.id === currentSessionId;
                const time = new Date(session.createdAt).toLocaleString('zh-CN', { 
                    month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                });
                
                return `
                    <div class="session-item ${isActive ? 'active' : ''}" onclick="switchSession('${session.id}')">
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <div class="session-time">${time}</div>
                        <button class="session-delete" onclick="deleteSession('${session.id}', event)">x</button>
                    </div>
                `;
            }).join('');
        }

        function getCurrentSession() {
            return sessions.find(s => s.id === currentSessionId);
        }

        // ==================== LLM Config Loading ====================
        async function loadLLMConfigs() {
            try {
                const response = await fetch('/api/llm-configs');
                const data = await response.json();
                console.log('LLM configs response:', data);
                
                if (data.configs && Array.isArray(data.configs)) {
                    llmConfigs = data.configs.filter(c => c.is_active);
                } else {
                    llmConfigs = [];
                }
                renderModelSelector();
            } catch (e) {
                console.error('加载LLM配置失败:', e);
                renderModelSelector(); // Still render even on failure
            }
        }

        function renderModelSelector() {
            const select = document.getElementById('modelSelect');
            
            if (llmConfigs.length === 0) {
                select.innerHTML = '<option value="">无可用的LLM配置</option>';
                return;
            }
            
            select.innerHTML = llmConfigs.map(config => {
                const selected = config.is_default ? 'selected' : '';
                const star = config.is_default ? '\u2605' : '\u2606';
                return `<option value="${config.name}" ${selected}>${star} ${config.name} (${config.provider} - ${config.model_id})</option>`;
            }).join('');
        }

        // ==================== Message Rendering ====================
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const session = getCurrentSession();
            
            if (!session || session.messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-icon">◈</div>
                        <p>开始新的对话</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = session.messages.map(msg => {
                const isUser = msg.role === 'user';
                const avatar = isUser ? '你' : 'AI';
                const roleLabel = isUser ? '你' : (msg.model || 'AI');
                
                return `
                    <div class="message ${isUser ? 'user' : 'ai'}">
                        <div class="message-avatar">${avatar}</div>
                        <div class="message-content">
                            <div class="message-role">${escapeHtml(roleLabel)}</div>
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function addMessageToSession(role, content, model = '') {
            const session = getCurrentSession();
            if (!session) return;
            
            session.messages.push({ role, content, model });
            
            // Auto-generate session title from first user message
            if (role === 'user' && session.title === '新会话') {
                session.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                renderSessions();
            }
            
            saveSessionsToStorage();
        }

        // ==================== Send Message ====================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || isLoading) return;
            
            // Auto-create session if none exists
            if (!getCurrentSession()) {
                createNewSession();
            }
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Add user message
            addMessageToSession('user', content);
            renderMessages();
            
            // Set loading state
            setLoading(true);
            
            // Get selected model
            const modelSelect = document.getElementById('modelSelect');
            const configName = modelSelect.value || undefined;
            
            try {
                // Build messages array (last 20 for context window management)
                const session = getCurrentSession();
                const messages = session.messages.slice(-20).map(m => ({
                    role: m.role,
                    content: m.content
                }));
                
                // Call API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, config_name: configName })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addMessageToSession('assistant', data.content, data.model);
                } else {
                    addMessageToSession('assistant', `错误: ${data.error}`, '');
                }
            } catch (e) {
                addMessageToSession('assistant', `请求失败: ${e.message}`, '');
            } finally {
                setLoading(false);
                renderMessages();
            }
        }

        function setLoading(loading) {
            isLoading = loading;
            const sendBtn = document.getElementById('sendBtn');
            const messageInput = document.getElementById('messageInput');
            
            sendBtn.disabled = loading;
            messageInput.disabled = loading;
            sendBtn.textContent = loading ? '思考中...' : '发送';
        }

        // ==================== Utilities ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Custom Confirm Dialog
        let confirmCallback = null;

        function showConfirm(title, message, onOk) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmOverlay').classList.add('active');
            confirmCallback = onOk;
        }

        // ==================== Event Listeners ====================
        document.addEventListener('DOMContentLoaded', function() {
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                // Auto-resize textarea
                messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
                });
            }
        });

        // Initialize on load
        init();
    </script>

    <!-- Custom Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-title" id="confirmTitle">确认操作</div>
            <div class="confirm-message" id="confirmMessage">确定要执行此操作吗？</div>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-btn-cancel" id="confirmCancel">取消</button>
                <button class="confirm-btn confirm-btn-ok" id="confirmOk">确定</button>
            </div>
        </div>
    </div>
</body>
</html>
